name: Build & Push Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  ORG: decisionbox-io

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      api: ${{ steps.filter.outputs.api }}
      agent: ${{ steps.filter.outputs.agent }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'services/api/**'
              - 'libs/**'
              - 'providers/**'
              - 'domain-packs/**'
            agent:
              - 'services/agent/**'
              - 'libs/**'
              - 'providers/**'
              - 'domain-packs/**'
            dashboard:
              - 'ui/dashboard/**'

  lint-dockerfiles:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.agent == 'true' || needs.detect-changes.outputs.dashboard == 'true' || github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4

      - name: Lint API Dockerfile
        if: needs.detect-changes.outputs.api == 'true' || github.ref_type == 'tag'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: services/api/Dockerfile
          failure-threshold: warning

      - name: Lint Agent Dockerfile
        if: needs.detect-changes.outputs.agent == 'true' || github.ref_type == 'tag'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: services/agent/Dockerfile
          failure-threshold: warning

      - name: Lint Dashboard Dockerfile
        if: needs.detect-changes.outputs.dashboard == 'true' || github.ref_type == 'tag'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ui/dashboard/Dockerfile
          failure-threshold: warning

  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-dockerfiles]
    if: always() && needs.lint-dockerfiles.result != 'failure'
    permissions:
      contents: read
      packages: write
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: decisionbox-api
            context: .
            dockerfile: services/api/Dockerfile
            changed: ${{ needs.detect-changes.outputs.api }}
          - service: decisionbox-agent
            context: .
            dockerfile: services/agent/Dockerfile
            changed: ${{ needs.detect-changes.outputs.agent }}
          - service: decisionbox-dashboard
            context: ui/dashboard
            dockerfile: ui/dashboard/Dockerfile
            changed: ${{ needs.detect-changes.outputs.dashboard }}

    steps:
      - name: Skip if unchanged
        if: matrix.changed != 'true' && github.ref_type != 'tag'
        run: echo "No changes for ${{ matrix.service }}, skipping" && exit 0

      - uses: actions/checkout@v4
        if: matrix.changed == 'true' || github.ref_type == 'tag'

      - uses: docker/setup-buildx-action@v3
        if: matrix.changed == 'true' || github.ref_type == 'tag'

      - name: Login to GHCR
        if: (matrix.changed == 'true' || github.ref_type == 'tag') && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        if: matrix.changed == 'true' || github.ref_type == 'tag'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        if: matrix.changed == 'true' || github.ref_type == 'tag'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Scan image with Trivy
        if: (matrix.changed == 'true' || github.ref_type == 'tag') && github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.service }}:${{ steps.meta.outputs.version }}
          format: 'sarif'
          output: 'trivy-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy scan results
        if: (matrix.changed == 'true' || github.ref_type == 'tag') && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-${{ matrix.service }}.sarif'
          category: 'trivy-${{ matrix.service }}'
