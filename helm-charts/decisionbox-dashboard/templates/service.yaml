apiVersion: v1
kind: Service
metadata:
  name: {{ include "decisionbox-dashboard.fullname" . }}-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "decisionbox-dashboard.labels" . | nindent 4 }}
  {{- if .Values.cloudArmor.enabled }}
  annotations:
    cloud.google.com/backend-config: '{"default":"{{ include "decisionbox-dashboard.fullname" . }}-ip-allowlist"}'
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - targetPort: {{ .Values.containerPort }}
      name: http
      port: {{ .Values.service.port }}
      protocol: TCP
  selector:
    {{- include "decisionbox-dashboard.selectorLabels" . | nindent 4 }}
